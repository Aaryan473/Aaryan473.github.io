<!DOCTYPE html>
<html lang="en">
<head>
    <title>About You</title>
  <link rel="stylesheet" href="../cd.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        form {
            border: 1px solid #ccc;
            padding: 20px;
            width: 320px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            margin-bottom: 10px;
        }

        .inline {
            width: auto;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<form action="/MY RESUME.html">
    <form>
        <h2>Contact Form</h2>

        <label>Name:</label>
        <input type="text" name="name">

        <label>Email:</label>
        <input type="email" name="email">

        <label>Phone No:</label>
        <input type="tel" name="phone">

        <label>Age:</label>
        <input type="number" name="age">

        <!-- Gender -->
        <label>Gender:</label><br>
        <label><input class="inline" type="radio" name="gender" value="male"> Male</label>
        <label><input class="inline" type="radio" name="gender" value="female"> Female</label>
        <br><br>

        <!-- Hobbies -->
        <label>Hobbies:</label><br>
        <label><input class="inline" type="checkbox" name="hobby" value="reading"> Reading</label>
        <label><input class="inline" type="checkbox" name="hobby" value="sports"> Sports</label>
         <label><input class="inline" type="checkbox" name="hobby" value="singing"> Singing</label>
        <br><br>

        <label>Country:</label>
        <select name="country">
            <option>India</option>
            <option>USA</option>
            <option>Russia</option>
        </select>

        <label>10th Passing Year:</label>
        <input type="number" name="10th_year">

        <label>12th Passing Year:</label>
        <input type="number" name="12th_year">

        <label>Current Status:</label>
        <select name="status">
            <option>Undergraduate</option>
            <option>Graduate</option>
            <option>Master Degree</option>
        </select>

        <label>Year (e.g., 1st, 2nd, 3rd):</label>
        <input type="text" name="year">

        <label>College Name:</label>
        <input type="text" name="college">

        <input type="submit" value="Submit">
    </form>
<p>If you click the "Submit" button, then you can know more about me will be sent to a page called "/MY Resume.html".</p>
</form>
</body>
</html>
